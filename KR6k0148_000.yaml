front:
  text: 四分戒本緣起事義引按四分律藏世尊説戒緣起初由舍利弗啓問過去七佛何者佛法得久住世何者佛法不久住世世尊答以結戒説戒得久住世不結不説則佛法速滅是為戒所由興也凡律不預陳必得比丘犯而後制據實定罪則人心服故舍利弗殷勤請説佛答非時又云佛自知時蓋待時而後制也凡契經或諸菩薩互為所説獨毗尼佛自説之其他不敢措一字何謂也如世禮樂征伐自天子出則諸侯拱手聽命而天下治自諸侯大夫出則四夷交侵民無所措其手足矣佛所説律亦復如是佛所結戒以十義故一攝取於僧二令僧歡喜三令僧安樂四令未信者信五信已令增長六難調者令調七慚愧者令安樂八斷現在有漏九斷未來有漏十令正法得久住世是故結一一戒皆先明乎此靈山聖會是栴檀林寧有不材散木良由懸見末世樗材拳曲擁腫是故先示繩墨而培植之大慈悲故權示弄引後學視此當規自心毋疑聖世
