body:
  text: 雲栖弟子釋廣莫輯録四分者一比丘戒二比丘尼戒三安居揵度四房舍揵度揵度此云法聚謂以法類相從者聚為一處故戒本者令是比丘戒別行之本也出曇無德部者先是佛成道後三十八年赴王舍城國王齋齋畢佛令羅睺羅洗鉢失手墮地碎為五片佛讖我滅度後諸比丘分我毗尼成五部也佛滅度後一百年時優波毱多尊者有五弟子果分佛律為五部一曇無德部二薩婆多部三迦葉遺部四彌沙塞部五婆蹉富羅部今本出曇無德部也曇無德此云法密今文初偈是宣律師刪定非藏本原偈一淫戒起自須提那尊者其父既歿母乃要其捨戒還家尊者不肯母再三要尊者終却之母云如不肯回可為種子于時佛未制戒尊者遂諾母命其妻就尊者三成其事果得子遂以種子為名後亦出家成道號種子尊者佛因制戒共戒同戒者藏本共下無戒字但云共比丘同戒謂共餘比丘一戒同戒等戒各同戒也不捨戒者佛謂若比丘不樂淨行聽捨戒還家若不捨戒及戒羸弱不自悔過犯不淨行是比丘波羅夷不共住共畜生者又一比丘林間習定一雌獼猴馴撓其前按行比丘伺見之白佛兼制故有此言波羅夷此云棄如人斬首不可復活故名棄也不共住者謂不與餘比丘同一羯磨同一説戒不共此二事住故下倣此二盜戒起自檀尼迦尊者為己造靜房不與取國王材木後事發攝此比丘國法盜五錢即論死王以比丘故但訶責而遣之故有驅出國之言三殺戒起自婆裘園中諸比丘因聞佛説不淨觀隨聞思修深厭色身求死不得覔刀欲自殺時有勿力迦難提比丘是外道種持刀入園有比丘倩斷己命乃以衣鉢酬之因斷六十餘僧命適有居士遊觀見尸滿園疑是比丘相持故殺遂起譏嫌世尊知之故制四妄語戒起自時世餓荒諸比丘乞食難得佛命隨處安居時婆裘園中諸比丘竊議方便希易得食乃向居士家説我已得上人法等云云後安居竟至世尊所慰問及此故制除增上慢者及一比丘耻未得道故妄言得後以精進實證阿羅漢果疑前妄語是增上慢今雖實證未了犯與不犯因白佛決疑佛為開除云不犯除此餘皆犯故以上四重戒竟十三僧伽婆尸沙僧伽婆尸沙此云衆殘蓋僧伽翻衆婆尸沙翻殘如器殘闕不堪用故僧為道器殘則非金德不完故一者起自迦留陀夷尊者以淫欲意戲失精佛知之故戒又一比丘夢中失精疑犯此戒白佛決疑除為不犯故有除夢之言二者亦起前人於房門外伺諸女人引入看房便與身相觸摩佛知之故戒三者亦起前人引婦女入房粗惡語故制四者亦起前人故制五者起自迦羅尊者故制六者佛在耆闍崛山聽諸比丘各自作房有一比丘因作房自手斫樹彼樹神多諸子孫神念比丘斫樹我子孫無依欲打比丘又念若打比丘得罪往白世尊具説其意佛歎善哉佛言汝今速往恆水邊有一大樹名曰娑羅彼神始命終汝可居止佛因制戒七者起自闡陀尊者與優填王善友王欲作為大房闡陀倚有主故於拘睒彌城有大樹往來車馬行人常憩其下闡陀伐之人皆譏嫌佛知故戒八者佛在耆闍崛山時沓婆摩羅子尊者知衆臥具房舍次第差僧受食有慈地比丘後至得惡房惡臥具惡食疑尊者有愛憎心託妹慈比丘尼以波羅夷謗彼尊者無根者言無根據也見聞疑三中皆無根故尊者是阿羅漢具清淨行彼以嗔恚意欲壞淨行佛聞故制九者亦是前人慈地比丘前事治竟下耆闍崛山見羝羊與母羊交以羝羊比沓婆尊者以母羊比慈尼遂以此復謗云親見也羊本異類故云異分中取片片者謂異中取少分相似耳非實罪故云非波羅夷謗也凡與同姓同名同貌皆名異分十者起自提婆達多初句是壞和合僧之念以何法可壞故次句云然壞僧法彼有五事一盡形乞食二盡形著糞掃衣三盡形露坐四盡形不食酥鹽五盡形不食魚肉此五行似為善法良以立心破此而從彼故名壞僧法也以此矯詐諸初學輩不辨真偽誤信為實而從之遊也如王莽謙恭下士是順乎是逆乎佛以此故制十一者餘黨者是前人餘黨也達多餘黨有四一名文陀達多二名騫荼達多三名拘婆離四名迦留羅提舍十二者起自二尊者一名阿濕婆二名富那婆娑在羈連村舍行惡行者自種花木教人種花木自灌溉教人灌溉自摘花貫花教人摘花貫花自持花鬘與人教人持花鬘與人共女人一坐食欲笑雜説及種種不律儀事俱名惡行污他家者污家有四種一依家污家謂向彼家得物與此家與一家不與一家與者喜不與者嗔二依利養污家謂比丘所得利養與一家不與一家與者喜不與者嗔三依親友污家或比丘與王臣友善護一家不護一家護者喜不護者嗔四依僧寺污家謂比丘取僧寺物與一家不與一家與者喜不與者嗔若種花供三寶者不犯十三者起自闡陀尊者結文中波利婆沙此云別住謂諸比丘不與同起止也摩那埵此云意喜謂比丘犯罪隨順受罰衆意生喜故以上十三衆殘竟二不定法不定者謂於三法中不定治故一者佛在祇園時迦留陀夷在俗時一親友婦名曰齋優婆夷彼此情密尊者既出家猶與往來一日至彼屏處同坐説非法語有鄰家正信優婆夷名毗舍佉聞知非法語又窺見同坐云云三法即下所出二者亦是前人露坐故除波羅夷隨二法治三十尼薩耆波逸提梵語尼薩耆波逸提此云捨墮此三十事皆在衣物上治罪犯罪比丘衣物要向僧中捨犯此是則負墮捨其衣者即罰而治也又捨則免墮故名捨墮捨衣法律云此捨墮衣應捨與僧要衆中捨若一人處不應捨應往僧中偏露右肩脫屣向上座禮胡跪合掌當作是言大德僧聽我某甲比丘於某事犯捨墮我今持此或衣或鉢捨與僧捨衣竟當懺悔受懺人當作白然後受懺白云大德僧聽此某甲比丘於某事犯捨墮今持或衣或鉢捨與僧若僧時到僧忍聽我受某甲比丘懺悔作此白已然後受懺當與彼人言自責汝心彼答云敬聞所誨一者佛在祇園不聽比丘畜長衣時六群比丘故畜長衣早時中時晡時更衣入衆知足比丘舉白世尊故制初句衣已竟者指比丘三衣已足也迦絺那此云功德凡淨施者皆稱功德謂所長衣已淨施也出即施出故此指衆説得長衣經十日畜者佛制此戒時阿難因得貴價糞掃衣欲施大迦葉而迦葉行頭陀於外不在阿難疑畜此不施恐犯此戒往啓世尊佛問迦葉何時歸答云須十日佛又聽得十日畜也過十日不施則犯二者起自六群比丘以三衣寄親友比丘處去遊人間受寄比丘恐彼衣蟲損潤壞於日中晒他比丘見問曰佛制不聽畜長衣此何有耶受寄人答云云白佛故制除僧羯磨者佛制此戒時有病比丘有事欲去人間三衣重不能持行白佛佛因集衆白二羯磨結不失衣法故云除僧羯磨羯磨此云作法二羯磨者一治罪二成喜下倣此三者起自一比丘大衣故壞更造新衣十日不能完辨故衣未能即捨因此白佛故制聽畜得一月為滿足故非時衣者非施衣時之衣也欲須便受受已疾成者謂欲須非時衣便受之受即疾造成衣十日不及造復開一月為其滿足造故四者起自蓮花色比丘尼所著上色衣見一比丘衣衲破弊生憐愍心脫已上衣易彼弊衣而自著之覲佛佛問何著此弊衣耶尼敘前所以佛謂汝衣滿足有餘聽施何以故婦人著上衣猶有所憎況弊衣耶故制佛制此已諸比丘以畏慎故不敢從親里尼取衣佛又更制非親里三字時祇園中二部比丘比丘尼得施衣共分時男得女衣女得男衣尼持衣與比丘貿換比丘不敢與換佛又開除貿易也五者起自迦留陀夷與偷蘭難陀比丘尼淫意相看故有所污尼與浣衣所事猥媟諸尼嫌之白佛故制諸比丘因制不敢使親里尼浣染佛更制非親里之言六者起自跋難陀釋子尊者舍衛城中一長者與其友善至祇園中謁之尊者為説妙法得法喜故欲有所施尊者却之彼固請云欲何所須者云唯當施汝所著衣此衣貴價彼云待回家即命送獻何以故入城無外飾故尊者即欲之彼不獲已脫而別去入城時守門卒云長者被劫耶何衣而歸長者訛云祇園門外被賊劫去門卒即欲追之長者因敘及之聞者譏嫌佛聞故制諸比丘不敢從居士索衣佛因更制加非親里之言除餘時者制時有諸比丘夏安居竟來覲佛晝熱夜行被盜奪衣佛又開奪失燒漂等緣此為居士乞衣不犯七者起自被盜比丘有多比丘為盜劫衣赤身至祇園門上諸居士聞之多持好衣來施有他比丘冒取轉與六群比丘佛聞故制自恣請多與衣者謂諸居士先自恣意請願多施僧衣不限取一取二是故下云當知足受八者起自跋難陀跋難陀聞一居士為其辨衣價次日即至彼家云云彼居士遂生嫌心云我私議未來恣請云何比丘先至説耶佛聞故制九者亦起前人聞二居士家為辦衣價云云佛聞故制十者亦起前人羅閲城中有一大臣與尊者友善遣使送衣價與尊者尊者即遣此使持送某長者代收之後大臣問前使云所送衣價曾造衣否使答如上大臣重遣此使云如不造衣可取原價回尊者聞此疾至長者處取價造衣長者適有事出門聞取衣價乃云小待回時何故有約若去遲即輸五百金錢尊者同求之長者不獲已取與然後去以遲故遂輸五百金錢衆皆譏嫌白佛故制十一者佛在曠野國時六群比丘作新野蠶綿臥具至養蠶家買蠶家云蠶未熟小待彼比丘伺待其傍蠶家以急故日曝蠶繭蠶蛹煩熱作聲正信居士見而嫌之佛聞故制十二者毗舍離城諸年少者邪淫多欲因以純黑羺羊毛作氈被體夜行使人不見六群效之亦以純黑羺羊毛作臥具諸年少見而嫌之云我等好淫故作此汝等比丘亦復好淫耶佛聞故制羺音耨十三者起自六群比丘又作純白羊毛新臥具諸居士譏嫌云比丘耽富樂如王如大臣佛聞故制尨音傍律中又作牻云牻色也多毛狗為尨蓋取其毛色故十四者起自六群佛在祇園時六群比丘嫌臥具或重或輕或薄或厚欲作新臥具知足比丘嫌之白佛故制除僧羯磨者一病比丘舊臥具是糞掃臥具極重有事欲入人間難持以此白佛佛為白二羯磨聽作新臥具故云除僧羯磨十五者佛在祇園一日佛不受請遣人請食世尊常規諸比丘受請後遍探諸房因見故坐具處處狼藉佛思所以用此故物之法為壞色故者恐新者易壞其色故蓋舊者得以用新者不易壞故制此也十六者起自跋難陀因道上行杖頭多貫羊毛諸居士譏云如販羊毛客佛聞故制十七者起自六群比丘持羊毛使憍曇彌比丘尼浣染尼因覲佛佛見手黑故問尼答如上佛因制此諸比丘因制不敢使親里尼浣染佛因更制加非親里之言擘者析也十八者起自跋難陀因羅閲城中一大臣與其友善留食待尊者至大臣之子因節會嬉戲還家索食母答無他食秪有為跋難陀所留食在其子遺錢命買且借食之尊者至聞之索錢而去人間而譏之他比丘以此白佛故制十九者亦起前人因以錢易錢諸居士見而譏言沙門猶以錢易錢善買賣耶佛聞故制二十者亦起前人因道路行不乞食將生薑入村易食既去舍利弗後至乞食至易食之家食家索飯價舍利弗答云比丘不易食彼云向者跋難陀比丘以生薑易食而去大德何故不易耶又一外道得一貴價衣外道自念何用此貴衣為當與人貿之遂往祇園適跋難陀打浣故衣如新便與貿之外道持皈餘外道識是故衣彼外道因返皈跋難陀索其原衣跋難陀不與相為諍直他比丘嫌之白佛故制二十一起自六群比丘喜持好鉢因多留鉢衆居士見而譏之佛聞故制又阿難得貴價鉢欲奉大迦葉因出行不在阿難恐犯此制啓佛佛因開得十日畜也二十二起自跋難陀鉢破入城至居士家乞易新鉢居士買鉢與之如是歷多居士家乞易鉢皆買與之一日有他事衆居士集在一處偶言及此衆居士各説與買鉢以此嫌之他比丘聞此白佛故制是鉢往僧中捨者跋難陀所乞多鉢應往僧中捨也上座比丘取最下鉢與跋難陀持是罰意也二十三亦起前人欲縫僧伽黎入城乞線亦處處乞得多線自念比丘三衣難得令人織作衣自手牽緯督織衆居士嫌佛聞故制二十四舍衛城中一居士持線與織師織衣施跋難陀付線與織師即他往織師因持線往祇園報跋難陀跋難陀因囑要好織廣長堅緻織師云線少難陀遂至居士家更索線與織師彼又云工直少難陀云當益汝價彼居士他回問前事居士婦白如上因嫌之他比丘聞此白佛故制二十五難陀尊者一弟子善能勸化跋難陀喜之約同遊人間因與衣有他比丘私與弟子説跋難陀非法非律多所犯戒勿可從遊彼弟子因却之不與去跋難陀嗔奪取所與衣因高聲鄰房比丘問所以云云因白佛故制二十六時祇園值秋月諸比丘患風疾瘡疥佛聽服五種藥先制不聽非時食今雖得藥不敢非時食服不以時病不愈因聽病比丘時非時服藥又佛與千二百五十人遊摩竭國界時畢陵伽婆蹉在此城久住所識者多大得供養諸弟子儲積甚豐諸居士嫌之佛聞故制二十七舍衛城中毗舍佉優婆夷設食供佛及僧因遣婢至祇園唱時到其時正大雨佛聽諸比丘雨中浴皆倮形雨中俾窺見之歸白大家食後毗舍佉啓佛請願施僧雨浴衣佛因聽諸比丘畜雨俗衣後六群比丘春夏冬時皆乞此衣諸比丘嫌之白佛故制春殘一月在者是三月十六日也彼土一年分三時是故三月十六應求雨浴衣至四月初一聽用若過先求過先浴者俱犯二十八時舍衛國有民叛逆王遣大臣征之大臣念諸比丘安居未滿猶有十日在今出征未得歸當先施衣設供因至祇園恣請諸比丘云但設供安居未竟未敢受衣以此白佛佛聽受急施衣得畜至衣時二十九準彼土一年分三際每際得四月今文説夏三月者三月是安居制法餘一月作治衣遊行之隙據此則以四月十六日為始七月十五為終故餘有一月在故云八月十五滿也逈遠等者因他比丘安居滿在阿蘭若住為賊劫衣坐具針筒什物又打傷比丘以畏賊故皆來祇園寄住佛因更制云云時六群比丘聞佛聽離衣宿遂寄衣與親友比丘去遊人間久而不歸受寄比丘日中晒衣他比丘知之白佛故更制限六日過者犯也三十舍衛城中一居士欲設供施衣至祇園請佛及僧時跋難陀先至彼家説衆比丘皆當足不必具衣食施衆僧衣可施我一人居士信之因不辦衆僧衣明日佛及衆僧時到彼家居士見諸比丘威儀德望悔不辦衣因説跋難陀事故制以上三十尼薩耆波逸提竟九十波逸提法梵語波逸提此云墮前者隨衣鉢上治罪墮捨其物故云捨墮今此九十法皆在言行上治罪無可捨故故單言墮也墮是負墮有墮落罪故一者起自釋種象力尊者善能論議隨于沙門中或梵志中凡論議有不勝處即反前論知而妄語衆僧嫌之白佛故制二者起自六群比丘斷諍事時以卑賤種類罵辱比丘令彼羞耻故制三者起自六群傳彼此屏處語使彼諍事不息故制四者起自阿那律陀尊者因遠道行至無比丘住處入村覔宿唯一淫女家常止宿行客尊者求宿室中先敷臥具又一長者亦投止宿與尊者同一室彼僕從多逼近尊者時淫女憐之白言我室中宿得不尊者云何逐與淫女同室宿至後夜淫女欲心起至尊者所説如此事尊者正定現前默然不答彼即脫衣欲就近之尊者涌身空中淫女慚愧合掌求懺如是至三尊者還復本座既歸祇園説如上事佛因制此五者佛在曠野城時六群比丘中一人與諸長者共宿此僧放意眠熟轉側倮形鄰臥者以衣覆之少時又露諸同臥者譏嫌調弄佛聞故制諸比丘因制不聽未受大戒人共宿時羅睺羅是佛之子未受大戒因遣出房無處可容去廁中宿佛以天眼見之往廁上引歸佛所共止一宿明日因責諸僧無慈驅小兒出乃更制二宿三宿也六者亦起六群與諸長者共誦佛經如婆羅門讀書聲亂諸禪者故制七者佛在靈鷲山時有比丘行波利婆沙摩那埵者在下行坐六群比丘指彼下行比丘問諸白衣説如許人在下行坐者犯粗惡罪故罪使下行坐也彼下行比丘聞之慚愧譏嫌六群因白佛故制除僧羯磨者時舍利弗為衆所差向王臣長者居士陳白提婆達多破僧等逆舍利弗恐犯此戒以此白佛佛與羯磨故加除僧羯磨不犯八者起自婆裘園中有比丘向諸沙彌及居士輩説過人之法佛聞故制九者起自迦留陀夷入舍衛城一長者家在姑前為兒婦就耳説法姑云説法當高聲説令我等得聞云何耳邊獨言耶佛聞故制結此戒後諸女人請比丘説法諸比丘不敢為説以此白佛佛聽與女人説法五六語若過五六語即犯若有智男子前為女人説法過者不犯故云除也十者起自六群比丘為佛修治講堂自手掘地諸長者嫌言自手掘地傷蟲命故佛聞故制十一起自曠野比丘以自手斫樹凡一切草木鬼神所依今斫樹者名壞鬼神村使無依故佛聞故制十二起自闡陀比丘闡陀犯罪治罪比丘問言汝犯此罪知否彼故支吾不以正答佛聞故制十三起自慈地比丘時沓婆摩罪尊者知僧坐具飲食慈地於屏處説尊者有愛憎心諸比丘聞此訶責慈地慈地答言我但在屏處嫌之耳後猶嫌不已諸比丘重責彼答云不嫌但罵耳以此白佛故制十四時舍衛城中一長者設食飯僧時到十七群比丘取僧坐具在露地敷坐時到不收而去為風塵烏鵲所污佛聞故制十七群者十二至十七歲者為一類故名十七群也十五時祇園中有客比丘語舊住比丘云我在邊僻房中敷臥具宿後時不語不收便去臥具爛壞舊住比丘白佛故制十六六群與十七群比丘遠行道中至無僧住處十七群語六群言長老汝等先去求止宿處六群言何預汝事汝等先去時十七群先求宿處先敷臥具六群後來其中強敷臥具云云他比丘嫌之白佛故制十七亦起六群與十七群比丘自曠野道中行至一小住處十七群與六群言長老先敷臥具六群不答十七群因先灑掃房舍敷好臥具六群抵暮方至竟據靜房十七群分説因嗔強驅牽出十七群高聲鄰房比丘聞而嫌之白佛故制十八祇園中有諸比丘在重閣上坐脫腳床臥不安庠閣下有比丘宿閣板朽爛床腳脫下打傷閣下比丘以此白佛故制十九起自闡陀因作大房以蟲水和泥諸長者譏嫌白佛故制二十亦起前人作大房覆有餘草覆更重覆草尚有餘彼自念言我不能常求檀越既有餘草重重覆之屋上重故摧折破損諸居士嫌之比丘白佛故制二節三節即兩層三層也二十一起自大愛道比丘尼往世尊所乞願聽諸比丘教授尼衆佛因聽諸比丘隨次差上座大比丘教戒尼衆時六群比丘不差自去教授又不教授正法但言世諦大愛道比丘尼重白佛故制二十二起自難陀尊者僧差教授比丘尼説諸妙法尼衆樂聞不覺日暮尼衆皈時舍衛城門已閉尼衆便就城塹中宿次且門始開時尼得入城居士輩便譏尼衆從比丘處宿故早入城佛聞故制二十三起自六群比丘以僧不差教授尼衆生嫉妬心因謗差者為飲食故佛聞故制二十四起自祇園一比丘入城乞食威儀可觀尼衆起敬數數請彼比丘比丘不受後因祗園分衣彼比丘得衣出祇園門見彼尼來自念此尼數數請我我雖不受亦見彼敬心我將所得衣送彼彼必不受我以此可作相酬意耳念已即以衣送尼尼輒受之比丘心嫌故數向人説此尼數數請我鉢中私致餘物與我我却不受我送彼衣彼輒受之數數以此告人人聞此不堪因白佛故制結此戒已諸比丘因不敢與親里尼衣更加非親里之言又祇園分衣時二部得衣尼來貿衣比丘不與佛更制除貿衣也二十五起自迦留陀夷為一尼縫衣戲作淫欲之狀又令莫預看莫與人看待受請時著又令在尼衆後行此尼皆奉教至受請時著此衣隨尼後行衆居士見而笑曰尼著淫衣耶尼主以此白佛故制二十六起自迦留陀夷與偷蘭難陀比丘尼在門外共一處坐人見譏言如夫婦如鴛鴦佛聞故制二十七起自六群比丘與六群比丘尼同遊人間人皆嫌之佛聞故制結此戒已諸比丘不敢與尼同行比丘前行尼衆後行為賊劫衣以此白佛佛因更制除餘時也二十八六群比丘與六群尼共乘船行上水下水諸居士譏嫌佛聞故制渡恆河時比丘不敢喚尼同渡值夏月大雨河水泛漲水面濶日暮尼不得渡在此岸宿為賊所劫以此白佛故更制除直渡不犯二十九時舍衛城中一居士請舍利弗目犍連食於露地敷座時偷蘭難陀比丘尼與諸居士舊識偶到彼家見設供具問居士請比丘耶請何等比丘居士報言請舍利弗目犍連等尼言彼下賤人若先語我我為請龍中之龍居士問誰是龍中龍耶尼答云提婆達多等是也語時舍利弗等已至尼語居士言龍中龍已至居士語尼言向言下賤今何言龍今而後汝不可復至我家舍利弗等以此白佛故制又因羅閲城中一長者欲飯黎師達尊者一尼在彼家聞此語故時黎師達至此城尼即報長者長者遂設食往請云尼報乃知黎師達因不受請長者以先白佛佛因更制故云除施意主先意不犯三十起自阿那律陀時毗舍離女嫁舍衛國人與姑共諍竊皈本國時阿那律從舍衛國欲至毗舍離城彼女問尊者乞帶同去尊者諾與偕行後彼夫主追至責阿那律有何字乎故帶人妻逃走耶那律辨之不信即打尊者瀕死尊者忍受在下道趺坐入火光三昧其人惻然回善向尊者懺悔尊者受懺而去回祗園時自説其事佛因制戒三十一時拘薩羅國一居士向無僧居處為作居處接待衆僧但聽一食時六群比丘往彼得好美食久住不去諸居士嫌之他比丘白佛故制舍利弗在彼得病不敢過食扶病而去病遂增劇佛知之因更制無病過食者犯三十二佛與千二百五十比丘遊行阿那頻頭國界時有沙䨲波羅門車載飲食隨佛後行以伺無供之日當設食供衆隨日既久無有缺供之日遂語阿難道其本意今供不及設離家日久欲將車載之物布在道上乞佛及僧腳蹈其上即為供養吾便別去阿難止彼代為白佛佛命作粥使衆僧食粥已然後赴請諸居士聞聽先食粥後赴請家家作粥先送僧食一大臣其日設供諸比丘先食美粥至大臣家食少大臣嫌之以此白佛故制不聽展轉食餘時下皆有因緣不能備録三十三時提婆達多教人害佛惡名流布利養斷絶乃與餘黨之陀達多等家家乞食名為別衆食結此戒已諸病比丘有請食處不敢別衆食佛因更制除餘時也作衣是比丘自恣竟造衣時施衣是施主施衣兼設供養故云施衣時又比丘與同伴遠行中途乞食同伴云同我等食比丘答云不敢別衆食因入村乞食同伴先行比丘後行為賊所劫故聽行道時別衆食船行同上説又瓶沙王姊子名迦羅欲大集沙門施食比丘不敢赴食以此白佛故開大會食時三十四時舍衛大村一女嫁禪國人皈寧父母正信施食施乞食比丘正作食時夫家來接婦云作食竟同去乞食僧相繼來不得去夫嗔別取妻又一商人在中途造食乞食比丘至分己食與去乞食僧又至復分與去己食盡重造同伴先去彼商後行為賊所劫諸比丘聞此白佛故制結此戒已病比丘不敢過受食佛因更制無病語三十五佛在祇園説比丘一食法歎譽一食法諸比丘聞之便受一食法不更食故形體枯瘦佛問阿難諸比丘何故形體枯瘦阿難答如上佛因聽諸比丘一座食飽滿更遇五種美食及藥不敢復食形體尚瘦佛問阿難阿難還答如上佛又聽僧食五種食五種食者飯乾餅餘淨肉於此五種隨得令飽足諸病比丘不能一座令飽所餘食不敢復食佛又聽作餘食法餘食法者彼比丘足食已又得食者彼比丘應食少許語他比丘言隨意取食此名餘食法若不作餘食法更食者犯三十六舍衛城有一比丘貪食食不厭足他比丘説其貪食如此彼比丘懷慚銜恨在心異時遇食彼貪食比丘不作餘食法殷勤勸前説者令食彼説者即受食之貪食比丘亦復謂前説者貪食似轉羞耻其人耳彼受食比丘問云汝知我足食亦復勸我食耶彼比丘答云然然則知我足食而勸者故使我犯耶以此白佛故制三十七時羅閲城中節會作衆伎樂難陀跋難陀二比丘往看衆白衣人相語汝等空看當供給二比丘飲食彼人等即相與飲食二比丘食已看伎向暮回靈鷲山諸比丘問云何故至晚方回二比丘以此白之又迦留陀夷向晚乞食一孕婦開門忽見驚謂是鬼即墮胎佛聞此事故制三十八靈鷲山迦羅尊者乞食時作念云何用日日乞食入城瘦苦今當所食之餘存於明日明日之餘存於後日時諸比丘於小食大食中不見迦羅因查問知此具白世尊故制三十九時祇園一比丘作是念言我當常乞食著糞掃衣便行此行乞食時見他男婦在河邊或城下為先亡祭祀設食彼比丘竟取食之不從人受者名不受食彼祭祀人見而嫌言比丘不與取食佛聞故制若藥著口中者謂凡所有若酥若若藥不與取著口中者犯四十時跋難陀尊者先有一商主為檀越乞食時到至商主家云我欲雜美食食當為我辨商主問云得何患耶比丘答云無患商主云既無患比丘猶思美食我等作商勞苦尚不得美食食也他比丘聞此向白世尊故制四十一佛與諸比丘從拘薩羅國向舍衛國途間諸檀越供養大得餅食佛命阿難為衆僧分餅有餘佛命分與乞兒乞兒中有一倮形外道女顏貌端正分餅至女偶兩餅粘住阿難不覺分與之傍人相問知女得二傍人以謂阿難於女有情諸比丘白佛故制四十二舍衛城中一長者因跋難陀兼請衆僧食衆僧已集跋難陀且往餘家食時已到彼猶未來衆僧索食長者云待跋難陀至衆僧云食時過則食不足矣又一居士因跋難陀遣使持新果入祇園供僧囑使云待跋難陀分其日跋難陀又至餘家食時過方回使衆僧不得食新果以此白佛故制除餘時者有因緣如前説至餘家囑餘比丘者囑人令知不待而食故也四十三起自迦留陀夷至齋優婆夷家齋婦與食尊者食已久坐不去其夫連次遣去故不去其夫見嫌佛聞故制寶者兼制金銀餘物等四十四亦起前人至齋優婆夷家屏處坐故四十五亦起前人亦是彼家四十六起自跋難陀與一比丘共鬪欲與懺悔結恨在心故邀彼僧入城與食周遍行遊食時至不與食而遣之彼比丘入祇園不得食跋難陀既遣彼已往至食家足食而歸佛聞故制四十七佛在迦維羅國時摩訶男釋種供衆僧藥敬上座故施與好藥求亦與不求亦與六群中相謂我等當至彼家求索既至索時偶乏藥當轉買與六郡訶言汝家無藥何以供僧汝有愛憎又復妄語釋摩男云我先有誓家有當供無則買與何言我妄我今不供僧藥矣他比丘嫌六群僧妄訶彼故使彼斷衆僧藥具白世尊故制聽僧四月受藥四月者三際中一際也時病比丘過四月已不敢復受佛聞更制無病受者犯又有居士常請受藥釋摩男更請供藥又有分請施者又有盡形施者佛皆聽受故除云云四十八時波斯匿王行軍六群往觀王心嫌之以石蜜一囊寄奉世尊佛因六群汝往觀耶故制有督軍主師名黎師達欲見比丘遣使往請世尊聽往故除因緣往者不犯四十九時六群比丘有事往軍中宿見者嫌之他比丘白佛故制五十時六群有事軍中宿因看鬪戰一僧為箭所射衣裹輿還人問及此衆皆嫌之佛聞故制五十一起自娑伽陀尊者本是六群中人至一梵志家借宿彼云有一空室不堪與宿尊者問何故彼答中有毒龍恐害汝故者云但宿無害即敷坐具而坐中夜果有毒龍見僧宿此遂吐火煙娑伽陀入火光定亦放火龍怒甚大放火娑伽陀亦放大火彼此相然娑伽陀念言滅彼毒火龍火漸滅伽陀火愈熾遂降彼龍置鉢內明日示梵志時拘睒彌王適在梵志家信敬尊者別時囑梵志若尊者再來報我當一供養異時娑伽陀再到梵志家梵志報王王自躬請六群比丘為王説言所食易為能持比丘難得者為供可耳王問何者難得報言唯黑酒難得明日時到娑伽陀至王所設種種美食過飲黑酒皈時為酒所醉倒地而吐鳥鵲食吐亂鳴佛知而故問阿難具白如上佛言癡人昔降大龍如今不能降小蛇矣故制五十二起自十七群比丘在阿耆跋提河中浴水中嬉戲順流逆流出沒拋擲時匿王與末利夫人高樓上望見之王與夫人相談年少出家佛法未深故耳夫人下樓遣那陵婆羅門致訊世尊具白此事故制五十三六群中一人擊櫪十七群一人至死他比丘白佛故制五十四起自闡陀比丘欲犯戒諸比丘諫而不從白佛故制五十五佛在波羅黎毗國在經行處經行時那迦波羅尊者奉侍左右初夜請佛歸房以至中夜後夜天將明佛猶不皈那迦念言屢請不皈我當恐怖之使歸乃反被惡衣作恐怖聲佛不能怖佛誡勑已因制五十六佛在摩竭陀國王有溫泉恆施僧浴時六群比丘於後夜時浴適王與婇女等來浴聞僧浴令莫驚待僧浴畢六群久浴以至天明不去王竟不得浴而去故制時諸比丘盛熱汙污病比丘及風雨遠行俱不得浴以此白佛故更制聽餘時也五十七起自六群佛在曠野城時六群自相謂言我等在上座前不得隨意言語即出房外露地拾野柴枝然火炙身不意朽樹中有毒蛇藏於內因火煙透入蛇驚出六群逆走將火株散擲延燒講堂故制此後病比丘及各色因緣俱不敢然火故除五十八佛在祇園有居士請食時十七群比丘持衣鉢挂在一面於經行處經行以俟時到六群比丘戲藏他衣聞白時到尋衣無獲六群藏衣餘比丘見遂白六群調弄故藏佛因制戒五十九時六群比丘先以衣施人後又不問衣主取著佛聞故制六十時六群比丘著白色新衣居士嫌之佛因制作三種色青黑木蘭者以三色互作非青非黑木蘭色故六十一起自迦留陀夷不喜聞鴉聲故作弓射死堆積諸居士譏嫌佛聞故制六十二起自六群取雜蟲水或飲或用居士見嫌故制六十三十七群比丘請問六群諸禪四果之法六群答言汝等妄語得上人法犯波羅夷十七群往上座處別問上座報言無犯上座以此白佛故制六十四起自跋難陀與一比丘親厚跋難陀數犯罪向親厚者云我犯如是如是罪勿向他説後與親厚僧共鬪彼僧即向餘比丘説除僧問言何時犯何時説覆至於今以此白佛故制六十五佛在迦蘭陀竹園時羅閲城中有十七群白衣童幼最大者十七最小者十二有富者貧者互相勉勵欲求出家時諸比丘度令出家受大戒諸童幼小習學不堪一食夜半患飢高聲啼哭佛知故問阿難答如上故制六十六時六群比丘鬪諍滅已更發故制六十七祇園有多比丘欲往毗舍離城時有賈客欲漏關稅期僧同往既至稅處為關人所捉關法偷稅當殺波斯匿王勑令放僧佛聞故制六十八時祇園有阿黎吒比丘作此惡見諸比丘三諫不止佛聞故制六十九亦是前人惡見不捨世尊令僧白四羯磨六群猶故供給止宿共同羯磨言語故制七十時祇園跋難陀有二沙彌一名羯那二名摩睺迦共行不淨又自相謂言云云諸比丘嫌貴二沙彌以此白佛故制滅去者即為作滅擯羯磨遠遣滅迹而去故也時六群僧誘引畜養止宿故制如此七十一時闡陀比丘餘比丘如法諫反發此言自不學戒又欲轉難餘比丘佛聞故制又開苦求解戒相問者不犯七十二時祇園有多比丘一處講法誦戒六群比丘見彼誦戒自相謂言彼等誦戒通利頻來舉罪我等止他不必誦此雜碎戒相若欲誦者當誦四重及十三僧殘足矣云云以此白佛故制七十三佛在祇園時六群中有一比丘自知犯戒當説戒時故作癡呆欲免舉罪諸比丘以此白佛故制更增無知罪者治本犯罪外又加無知一罪七十四時舀婆摩羅尊者因知僧事無暇赴外請由是衣服破損諸比丘常赴外請一日得貴儥衣皆發心施與沓婆尊者因於僧中白二羯磨如法施與時六群僧故作此言以衣施所親僧諸比丘聞已嫌之白佛故制七十五時祇園中衆僧既集欲作羯磨六群中自謂欲舉我等過犯不若先去令彼所舉不成言已即去諸比丘言汝等勿去有事故去耶以此白佛故制七十六時祇園中六群中有犯事者恐衆僧舉因相隨逐黨獲衆僧見彼強暴暫止異時六群作衣衆僧乘隙以他事喚彼六群答云作衣不暇喚者云若無暇可令一二人持欲去便了因令一二人去即與白衆舉治後因不服更訶故制七十七時六群比丘彼此鬪亂令諍事不息故制七十八六群中有一人嗔打十七群比丘故制七十九六群嗔十七群比丘故搏搏者扭撲也八十亦是六群嗔十七群妄加謗瀆故制八十一起自迦留陀夷入波斯匿王宮中王與末利夫人晝日共眠未起夫人遙見尊者即起披衣敷座令坐夫人失衣墮地因蹲而不起迦留陀夷即出宮尊者還祇園中説如上事佛聞故制剎利是梵語具云剎帝利此云王種水澆頭者輪王初紹住時金瓶盛四大海水王親執瓶灌太子頂方授與王位故名水澆頭也未藏寶者即夫人未避兼制金寶等也八十二有外道從柏薩羅國中途止息遺却千兩金囊衆多比丘後行拾得共云待來尋者付還彼外道去久方面尋覓比丘即付還原囊彼反詐言金少以至經官鞫審情實外道理虧金囊入官諸比丘聞之嫌彼比丘多事拾遺以此白佛故制後因節食毗舍佉優婆夷便道覲佛念云覲佛不必嚴飾如此故卸却置一樹下始入見佛去時忘取一比丘見之因制不取往白世尊故開云除僧伽藍中又一比丘寄宿居士家室中有寶僧為守護竟夜不眠以此白佛故并開除八十三起自跋難陀非時入村與居士樗蒲比丘勝故居士嫉之便嫌比丘非時入村佛聞故制樗蒲即賻錢也八十四起自迦留陀夷預知佛從此道來即於道中敷高廣座白佛云看我床座佛故制之八十五時六群僧作兜羅綿臥具居士見嫌兜羅此云細軟律云白楊花蒲臺花等也佛聞故制八十六羅閲城中有信樂工師為比丘作牙角針筒諸比丘皆令作故家業盡廢衣食缺之知足比丘白佛故制八十七佛在祇園一日不赴請施王送食世尊常規不受請時遍觀僧房見幽僻處以衆僧臥具敷在露地不淨所污為暴雨所漬故制聽作尼師壇障諸臥具時六群僧便多作廣長尼師壇故更制此八十八時祇園中諸比丘患癰瘡故膿血污身佛聽作覆瘡衣又衣粗毛著瘡舉衣患痛佛因命作細軟覆瘡衣六群便作廣長之衣他比丘以此白佛故制八十九時毗舍佉乞願為作雨浴衣六群便作廣大浴衣故制九十時難陀尊者身量短佛四指諸比丘遙見難陀來疑為是佛皆起奉迎既至乃是難陀衆僧以此白佛佛命難陀常著黑衣以別之時六群僧與如來等量作衣或過量作佛聞故制以上九十波逸提竟四波羅提提舍尼法梵語波羅提提舍尼此云向彼悔謂犯此可向彼對首懺悔也一者時舍衛國世儉穀貴人民飢餓死者無限諸比丘乞食難得蓮花色比丘尼初日所得食施與比丘二日所得三日所得皆施比丘一時在道上乞食一長者來車從多蓮花色尼避著道傍以飢暈故墮落坑中深泥掩面長者見之急令扶起問得何患尼乃報言為飢所患耳因問答如上結此戒後病比丘不敢受非親里尼食佛因更制無病之言二者時祇園諸比丘與六群比丘同在白衣家受食有六群尼為六群僧索羮索飯於此越役參互與食餘比丘以此白佛故制三者時羅閲城中有一居士夫婦皆正信樂施比丘乞食常相供養施無虗日以此貧乏諸居士説言彼家先時饒富因施僧食輒令貧乏比丘聞此往白世尊佛因聽僧與居士作學家白二羯磨作此羯磨不令比丘向他家乞食學家者謂學道而貧者之家也故為結此戒又有比丘先受學家請因制不敢復往病比丘亦不敢受學家食以此白佛佛乃更制故加先請及無病之言四者佛在迦維羅國尼拘類園中在城婦女持飯食往僧寺中途為賊觸撓佛聞故制謂若比丘在阿蘭若及逈遠恐怖處住故僧伽藍外不受食在僧伽藍內受食當向餘比丘悔過時病比丘因制不敢受持來食以此白佛故更制用無病之言以上四悔過法竟一百衆學法律藏云式叉迦羅尼法此云應當學又云突吉羅此云惡作此罪之至輕者下一百事皆是六群比丘所為文相可解不必繁引六群名者一闡提二迦留陀夷三文陀達多四摩醯沙達多五馬師六滿宿百中第六十五云富羅者是梵語未詳藏中不翻他處有云婆蹉富羅此翻犢子今此必是略梵語其云如上疑是犢鼻裩也博考俱未詳故名義集云富羅正言腹羅譯云短靿靴七滅諍法以此七法能滅過去現在及諸未來一切諍事故一者應與現前毗尼當與現前毗尼現前即是現在毗尼此云滅惡上句是審實度量下句是與治息諍下倣此謂治事上座比丘審實此事應與現在滅惡當與四目對首懺悔則諍事滅矣二者應與憶念毗尼當與憶念毗尼憶念是過去事或有比丘先時作惡後時方舉作者忘之則令憶念有則對衆懺悔豈彼無而妄舉耶然或以無根妄舉亦有之故念憶念有則改之無則如勉則諍事息矣三者應與不癡毗尼當與不癡毗尼不癡者謂有比丘顛狂心亂多犯衆罪後狂疾已愈諸比丘舉其所犯罪問言汝憶念否答言我不憶念但我顛狂時誤犯衆罪此非故作諸比丘猶舉不止因白佛佛令與作不癡毗尼白四羯磨衆中作法白竟諍事遂滅名不癡也四者應與自言治當與自言治自言者犯罪比丘自言罪相如有比丘所行惡事或波羅夷或僧殘或捨墮等彼能據犯言罪如自言治謂犯罪比丘應至清淨比丘所偏袒露頂禮足合掌自説罪名自説罪種從長老懺悔不覆藏衆僧受懺悔已則諍事滅也五者應與多覔罪相當與多覔罪相按四分律藏五應與覔罪相當與覔罪相六應多人覔罪相當與多人覔罪相坊本以第六作第五也多覔罪相即多人覔罪相也按事細審確實之意或有比丘作事在疑二之間則與按實所以多人細審究其罪相輕重使其心腹於所治無辭則諍事滅矣六者應與覔罪相當與覔罪相按四分律四十八中即現前受懺悔者是也覔罪相者對衆説罪意也謂若比丘所作顯實無疑乃與按事治罪以顯實故不必多覔故簡多字治事有衡則諍事滅矣七者應與如草覆地當與如草覆地此約喻説按四分律四十八云謂比丘多犯衆罪非沙門法惡言無度出入非儀犯罪者自念多犯罪等恐罪深重不如佛教令大衆住止不安因至長老上座前陳白己罪望諸長老忍聽甘作如草覆地懺悔己罪是名如草覆地法則諍事滅也又如草覆地是隨順服下之美何者良以上德臨衆不威而嚴又畏其德則服膺而順如草之覆下也又如魯語所謂君子德風小人德草草迎風而必偃矣義亦近是律藏但標七事不出其相散見別處故此會其意而潤其辭訂義如上若欲詳核可閲瑜伽論附白四羯磨集衆已為彼作舉作舉已為作憶念作憶念已應與罪
